<body>

<div class="artists">

{{range .Artists}}

<div class="card">

<img src="{{.Image}}" alt="{{.Name}}">

<h2>{{.Name}}</h2>

<p><strong>First Album:</strong> {{.FirstAlbum}}</p>

<p><strong>Members:</strong></p>

<ul>
{{range .Members}}

{{end}}
</ul>

</div>

{{end}}

</div>
